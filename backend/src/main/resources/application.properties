spring.application.name=homelibrary

# Liquibase – runs on both profiles
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Liquibase parameters
spring.liquibase.parameters.adminPasswordHash=${ADMIN_PASSWORD_HASH}

# JWT – prod value injected from SSM, local uses placeholder
app.jwt.secret=${JWT_SECRET:local-dev-secret-not-for-production}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# Cookie secure flag – overridden to false on local profile
app.cookie.secure=true

# CORS – prod value injected from Lambda env var, local fallback for development
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# OpenAPI – publicly accessible on all profiles (portfolio project)
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Reject unknown JSON fields on all DTOs (prevents silent field ignore / accidental data loss)
spring.jackson.deserialization.fail-on-unknown-properties=true
