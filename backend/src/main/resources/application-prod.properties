# Neon PostgreSQL – connection string injected from SSM Parameter Store
# as SPRING_DATASOURCE_URL Lambda environment variable
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username/password: injected from SSM as SPRING_DATASOURCE_USERNAME/PASSWORD
# Lambda env vars — Spring Boot relaxed binding maps them automatically (no explicit property needed)

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
